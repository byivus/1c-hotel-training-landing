<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Страница не найдена — TASolution</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f8f9fa;
      color: #212529;
      text-align: center;
      padding: 20px;
    }
    h1 { font-size: 72px; color: #1a56db; margin: 0; }
    p { font-size: 18px; color: #6c757d; margin: 12px 0 32px; }
    a {
      display: inline-block;
      background: #1a56db;
      color: #fff;
      padding: 14px 28px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      transition: background .2s;
    }
    a:hover { background: #1341b0; }
  </style>
</head>
<body>
  <div>
    <h1>404</h1>
    <p>Страница не найдена. Возможно, она была перемещена или удалена.</p>
    <a href="/">На главную</a>
  </div>
</body>
</html>
